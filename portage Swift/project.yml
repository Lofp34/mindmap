name: MindMapSwift
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
targets:
  MindMapSwift:
    type: application
    platform: iOS
    sources:
      - path: MindMapSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laurentserre.mindmapswift
        PRODUCT_NAME: MindMapSwift
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Mind Map
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
  MindMapSwiftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MindMapSwiftTests
    dependencies:
      - target: MindMapSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laurentserre.mindmapswift.tests
        GENERATE_INFOPLIST_FILE: YES
